version: 2.8.{build}

pull_requests:
  do_not_increment_build_number: true

skip_tags: true

image:
  - Visual Studio 2019
  #- Visual Studio 2017

configuration:
  - Win10-Release
  #- Win10-Debug
  #- Win8.1-Release
  #- Win8.1-Debug
  #- Win8-Release
  #- Win8-Debug
  #- Win7-Release
  #- Win7-Debug

platform:
  - x64
  #- Win32

shallow_clone: true

install:
- ps: >-
    . Tools\ci_install.ps1

before_build:
  - nuget restore -OutputDirectory .\Packages EasyHookSys.sln
  - nuget install -OutputDirectory .\Packages MSBuildTasks -Version 1.5.0.196
  - nuget install -OutputDirectory .\Packages vswhere -Version 2.8.4

build:
  parallel: true
  project: EasyHookSys.sln

artifacts:
- path: .\*.nupkg
  name: EasyHook NuGet
- path: .\Deploy\*.zip
  name: EasyHook Binaries