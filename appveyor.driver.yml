version: 2.8.{build}

pull_requests:
  do_not_increment_build_number: true

skip_tags: true

image:
  - Visual Studio 2019
  - Visual Studio 2017
  - Visual Studio 2015
  - Visual Studio 2013

configuration:
  - Win10-Debug
  - Win10-Release
  - Win8.1-Debug
  - Win8.1-Release
  - Win8-Debug
  - Win8-Release
  - Win7-Debug
  - Win7-Release

platform:
  - Win32
  - x64

matrix:
  # VS2013 supports everything but Windows 10 and the other
  # versions support all targets.
  exclude:
    - image: Visual Studio 2013
      configuration: Win10-Debug
    - image: Visual Studio 2013
      configuration: Win10-Release

shallow_clone: true

install:
- ps: >-
    . Tools\ci_install.ps1

before_build:
  - nuget restore -OutputDirectory .\Packages EasyHookSys.sln
  - nuget install -OutputDirectory .\Packages MSBuildTasks -Version 1.5.0.196
  - nuget install -OutputDirectory .\Packages vswhere -Version 2.8.4

build:
  parallel: true
  project: EasyHookSys.sln

artifacts:
- path: .\*.nupkg
  name: EasyHook NuGet
- path: .\Deploy\*.zip
  name: EasyHook Binaries