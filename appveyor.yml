version: 2.8.{build}

pull_requests:
  do_not_increment_build_number: true

skip_tags: true

image:
  - Visual Studio 2019
  #- Visual Studio 2017
  #- Visual Studio 2015
  #- Visual Studio 2013

configuration:
  - netfx4-Release
  #- netfx4-Debug
  #- netfx3.5-Release
  #- netfx3.5-Debug

platform:
  - x64
  #- Win32

shallow_clone: true

test_script:
  - Tools\ci_test.bat

install:
- ps: >-
    . Tools\ci_install.ps1

before_build:
  - nuget install -OutputDirectory .\Packages MSBuildTasks -Version 1.5.0.196
  - nuget install -OutputDirectory .\Packages vswhere -Version 2.8.4
  - nuget install -OutputDirectory .\Packages Microsoft.TestPlatform -Version 16.5.0
  - nuget install -OutputDirectory .\Packages Appveyor.TestLogger -Version 2.0.0
  - nuget restore -OutputDirectory .\Packages EasyHook.sln

build:
  parallel: true
  project: EasyHook.sln

artifacts:
- path: .\*.nupkg
  name: EasyHook NuGet
- path: .\Deploy\*.zip
  name: EasyHook Binaries