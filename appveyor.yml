version: 2.8.{build}

pull_requests:
  do_not_increment_build_number: true

skip_tags: true

image:
  - Visual Studio 2013
  - Visual Studio 2015
  - Visual Studio 2017
  - Visual Studio 2019

configuration:
  - netfx3.5-Debug
  - netfx3.5-Release
  - netfx4-Debug
  - netfx4-Release

platform:
  - Win32
  - x64

shallow_clone: true

install:
- ps: >-
    . Tools\ci_install.ps1

before_build:
  - nuget restore -OutputDirectory .\Packages EasyHook.sln
  - nuget install -OutputDirectory .\Packages MSBuildTasks -Version 1.5.0.196
  - nuget install -OutputDirectory .\Packages vswhere -Version 2.8.4

build:
  parallel: true
  project: EasyHook.sln

artifacts:
- path: .\*.nupkg
  name: EasyHook NuGet
- path: .\Deploy\*.zip
  name: EasyHook Binaries