version: 2.8.{build}

pull_requests:
  do_not_increment_build_number: true

skip_tags: true

image:
  - Visual Studio 2013
  - Visual Studio 2015
  - Visual Studio 2017
  - Visual Studio 2019

configuration:
  - netfx3.5-Debug
  - netfx3.5-Release
  - netfx4-Debug
  - netfx4-Release

platform:
  - Win32
  - x64

shallow_clone: true

install:
- ps: >-
    . Tools\ci_install.ps1

build:
  parallel: true
  project: EasyHook.sln

#build_script:
#- cmd: >-
#    call Tools\ci_build.bat

artifacts:
- path: .\*.nupkg
  name: EasyHook NuGet
- path: .\Deploy\*.zip
  name: EasyHook Binaries